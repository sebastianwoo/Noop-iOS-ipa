# .github/workflows/build-noop-ipa.yml
#
# Polls NoopApp/noop for new releases and builds an UNSIGNED iOS .ipa whenever a
# new version appears (checked every 6 hours), then publishes it as a Release on
# YOUR fork so SideStore can install it (SideStore signs on-device with your free
# Apple ID).
#
# WHY POLLING INSTEAD OF `on: release`:
#   GitHub's `on: release` only fires for releases created in THIS repo. It never
#   sees upstream NoopApp/noop releases. So a cheap ubuntu "check" job polls the
#   upstream API every 6h and only spins up the expensive macOS build when the
#   latest upstream tag hasn't been built yet. Most runs no-op for free.
#
# SETUP:
#   1. Fork NoopApp/noop. Keep the fork PUBLIC (public repos get unlimited free
#      Actions minutes, including macOS; private forks burn the included minutes
#      fast at the 10x macOS multiplier).
#   2. Add this file at .github/workflows/build-noop-ipa.yml on the DEFAULT branch
#      (scheduled workflows only run from the default branch).
#   3. Settings -> Actions -> enable workflows, and enable read/write workflow
#      permissions (Settings -> Actions -> General -> Workflow permissions).
#   4. Builds land under your fork's Releases tab.

name: Build NOOP iOS ipa

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild even if this tag was already built"
        type: boolean
        default: false
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (UTC)

permissions:
  contents: write           # publish the .ipa as a Release on this fork

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.latest.outputs.tag }}
      build: ${{ steps.guard.outputs.build }}
    steps:
      - name: Get latest upstream release tag
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(gh release view --repo NoopApp/noop --json tagName -q .tagName)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Latest upstream release: $tag"

      - name: Decide whether to build
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.latest.outputs.tag }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          if [ "$FORCE" = "true" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"; echo "Forced rebuild of $TAG"; exit 0
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "build=false" >> "$GITHUB_OUTPUT"; echo "$TAG already built, skipping"
          else
            echo "build=true" >> "$GITHUB_OUTPUT"; echo "New tag $TAG, will build"
          fi

  build:
    needs: check
    if: needs.check.outputs.build == 'true'
    runs-on: macos-26
    steps:
      - name: Check out upstream at release tag
        uses: actions/checkout@v5
        with:
          repository: NoopApp/noop
          ref: ${{ needs.check.outputs.tag }}

      - name: Show toolchain
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # OPTIONAL: build the main app only (no widget) to dodge the App Group /
      # second app-ID problem on free Apple IDs. Uncomment and edit project.yml to
      # remove the NOOPiOSWidgets target + its dependency line, then re-generate.
      # - name: Strip widget target
      #   run: |
      #     # remove NOOPiOSWidgets from project.yml, then:
      #     xcodegen generate

      - name: Build unsigned device app
        run: |
          set -o pipefail
          xcodebuild \
            -scheme NOOPiOS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build 2>&1 | tee build.log | xcbeautify || {
              echo "::group::Last 80 lines of raw build log"; tail -n 80 build.log; echo "::endgroup::"; exit 65;
            }

      - name: Package .ipa
        run: |
          APP="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -n1)"
          echo "Packaging: $APP"
          mkdir -p Payload && cp -R "$APP" Payload/
          zip -r "NOOP-${{ needs.check.outputs.tag }}-unsigned.ipa" Payload >/dev/null
          ls -lh "NOOP-${{ needs.check.outputs.tag }}-unsigned.ipa"

      - name: Publish .ipa as a Release on this fork
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check.outputs.tag }}
        run: |
          gh release create "$TAG" \
            "NOOP-${TAG}-unsigned.ipa" \
            --repo "$GITHUB_REPOSITORY" \
            --title "NOOP $TAG (unsigned ipa)" \
            --notes "Unsigned iOS build of NOOP $TAG for SideStore. Auto-built from NoopApp/noop@$TAG. Signing happens on-device with your own Apple ID."
